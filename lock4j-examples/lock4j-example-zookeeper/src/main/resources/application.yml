server:
  port: 8082

spring:
  application:
    name: lock4j-example-zookeeper

lock4j:
  enabled: true
  default-provider: zookeeper
  default-wait-time: 0
  default-lease-time: 30000
  zookeeper:
    enabled: true
    connect-string: localhost:2181
    session-timeout: 60000
    connection-timeout: 15000

logging:
  level:
    com.geek.lock: DEBUG